name: Feature request
description: Suggest an improvement for a public SDK Parity project.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Keep requests public-safe. Do not include private plans, customer material, or internal strategy.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What developer or agent workflow is blocked today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
